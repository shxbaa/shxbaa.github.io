<div id="art"></div>


<script>
const text = document.getElementById("data").value;
const art = document.getElementById("art");

let i = 0;

function type() {
    if (i < text.length) {
        art.innerText += text.charAt(i);
        i++;
        setTimeout(type, 1); // speed
    }
}
